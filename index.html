<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#58cc02">
  <meta name="description" content="Jason's English Journal — 七天真实生活口语练习">
  <title>Jason's English Journal</title>
  <style>
    :root{
      --green:#58cc02;--green-dark:#46a302;--green-soft:#efffdf;
      --blue:#1cb0f6;--blue-dark:#168ac0;--blue-soft:#eaf8ff;
      --purple:#8b5cf6;--purple-dark:#6d43d4;--purple-soft:#f3efff;
      --yellow:#ffc800;--yellow-soft:#fff8d8;--red:#ff4b4b;
      --ink:#17333d;--muted:#6b8288;--line:#dbe8df;--paper:#fffdf7;--page:#faf6e9;
      --shadow:0 5px 0 #dce3e8;--radius:22px;
      --font-display:ui-rounded,"SF Pro Rounded","Arial Rounded MT Bold","Avenir Next Rounded",system-ui,sans-serif;
      --font-en:"Avenir Next","SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --font-cn:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;color:var(--ink);background-color:var(--page);background-image:radial-gradient(#cbdccd 1px,transparent 1px);background-size:18px 18px;
      font-family:var(--font-en);
      -webkit-font-smoothing:antialiased}
    button{font-family:var(--font-display)}
    .cn,.lesson-cn,.story-cn,.hero p,.section-title p,.upgrade-note,.correction p,.review-card p,footer{
      font-family:var(--font-cn)}
    h1,h2,h3,h4,.brand,.streak,.eyebrow,.day-tab,.lesson-kicker,.section-kicker,.speaker,.level{font-family:var(--font-display)}
    button:focus-visible,summary:focus-visible{outline:4px solid rgba(28,176,246,.25);outline-offset:3px}
    .app{max-width:1160px;margin:auto;padding:22px 22px 80px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.02em}
    .brand-mark{width:48px;height:48px;border-radius:15px;background:var(--green);color:white;display:grid;place-items:center;
      font-size:25px;border:2px solid var(--green-dark);box-shadow:0 4px 0 var(--green-dark);transform:rotate(-3deg)}
    .brand small{display:block;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
    .streak{display:flex;align-items:center;gap:7px;color:#d98800;font-weight:900;background:#fff7d6;border:2px solid #f2d765;border-radius:999px;padding:9px 13px}
    .hero{position:relative;overflow:hidden;border:0;background:#173640;color:white;
      border-radius:32px;padding:48px clamp(28px,5vw,58px) 46px;box-shadow:0 12px 0 #d9e4d7;margin-bottom:28px}
    .hero:after{content:"";position:absolute;width:320px;height:320px;border:70px solid rgba(255,255,255,.025);border-radius:50%;right:-140px;top:-160px}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;color:#17333d;background:#ffdc61;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:1000;letter-spacing:.13em;text-transform:uppercase}
    .eyebrow:before{display:none}
    h1{font-size:clamp(45px,7vw,76px);line-height:.98;letter-spacing:-.065em;margin:24px 0 16px;max-width:760px}
    .hero p{font-size:17px;line-height:1.75;color:#d6e4e0;max-width:720px;margin:0;font-weight:750}
    .hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
    .meta-pill{background:white;border:2px solid var(--line);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800}

    .day-path{display:grid;grid-template-columns:repeat(7,1fr);gap:14px;margin-bottom:24px}
    .day-tab{min-height:84px;background:var(--paper);border:2px solid var(--line);border-bottom-width:5px;border-radius:18px;padding:16px 20px;
      color:var(--ink);cursor:pointer;text-align:left;display:block;transition:.18s transform,.18s border-color,.18s background}
    .day-tab:hover{transform:translateY(-2px)}
    .day-tab.active{border-color:var(--green);background:var(--green-soft);color:var(--ink)}
    .day-num{width:auto;height:auto;display:block;background:none;color:var(--green-dark);font-size:13px;font-weight:1000;letter-spacing:.08em;margin-bottom:7px}
    .active .day-num{color:var(--green-dark);background:none;box-shadow:none}
    .day-tab b{display:block;font-size:18px;line-height:1.25;letter-spacing:-.02em}.day-tab span:last-child small{display:none}

    .lesson-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding:6px 2px 18px;border-bottom:2px dashed #d6dde6;margin-bottom:22px}
    .lesson-kicker{font-size:12px;text-transform:uppercase;letter-spacing:.13em;color:var(--green-dark);font-weight:1000}
    .lesson-head h2{font-size:clamp(34px,5vw,50px);line-height:1.04;letter-spacing:-.05em;margin:8px 0 5px}.lesson-head .lesson-cn{font-size:17px;font-weight:800;color:var(--muted);margin:0}
    .lang-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .toggle{border:2px solid var(--line);border-bottom-width:4px;background:white;color:var(--ink);border-radius:13px;padding:9px 12px;font-size:13px;font-weight:900;cursor:pointer}
    .toggle.on{border-color:var(--green);background:var(--green-soft);color:var(--green-dark)}

    .section{margin:34px 0 46px;scroll-margin-top:18px}
    .section-title{display:flex;align-items:center;gap:13px;margin-bottom:18px}
    .section-icon{width:44px;height:44px;border-radius:14px;color:white;display:grid;place-items:center;font-size:21px;font-weight:1000;box-shadow:0 4px 0 rgba(30,40,60,.15)}
    .section-title h3{font-size:30px;letter-spacing:-.04em;margin:7px 0 0}.section-title p{font-size:14px;color:var(--muted);margin:5px 0 0;line-height:1.5;font-weight:700}
    .section-kicker{display:inline-block;padding:7px 10px;border-radius:9px;background:#ffdc61;color:#17333d;font-size:11px;font-weight:1000;letter-spacing:.1em;text-transform:uppercase}
    .dialogue-icon{background:var(--blue)}.story-icon{background:var(--green)}.upgrade-icon{background:var(--purple)}.fix-icon{background:var(--yellow);color:#785900}

    .dialogue-list{display:grid;gap:13px}
    .exchange{background:white;border:2px solid var(--line);border-radius:var(--radius);padding:18px 18px 17px;box-shadow:var(--shadow)}
    .turn{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:start}
    .turn+.turn{margin-top:15px;padding-top:15px;border-top:2px dashed #e5e9ef}
    .avatar{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;color:white;font-size:13px;font-weight:1000}
    .coach .avatar{background:var(--blue);box-shadow:0 3px 0 var(--blue-dark)}.jason .avatar{background:var(--green);box-shadow:0 3px 0 var(--green-dark)}
    .speaker{font-size:11px;text-transform:uppercase;letter-spacing:.09em;font-weight:1000;margin-bottom:4px}
    .coach .speaker{color:var(--blue-dark)}.jason .speaker{color:var(--green-dark)}
    .en{font-family:var(--font-en);font-size:16.5px;font-weight:650;line-height:1.62;letter-spacing:-.004em}.cn{font-family:var(--font-cn);font-size:14.5px;line-height:1.68;color:var(--muted);margin-top:4px}
    .speak-btn{width:42px;height:42px;border:2px solid #b9dd9f;border-bottom-width:4px;border-radius:50%;background:var(--green-soft);color:var(--green-dark);cursor:pointer;font-size:15px;font-weight:1000}
    .speak-btn:active,.listen-btn:active,.toggle:active,.day-tab:active{transform:translateY(2px);border-bottom-width:2px}

    .story-card{position:relative;overflow:hidden;background:var(--paper);border:2px solid #b9dd9f;border-radius:28px;box-shadow:0 7px 0 #d7e7cb}
    .story-top{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:20px 24px;background:linear-gradient(90deg,var(--green-soft),#f9fff3);border-bottom:2px solid #d8edc8}
    .story-top b{font-size:15px}.story-top small{display:block;color:var(--muted);margin-top:3px}
    .listen-group{display:flex;gap:8px;flex-wrap:wrap}
    .listen-btn{border:2px solid var(--green-dark);border-bottom-width:4px;border-radius:14px;background:var(--green);color:white;padding:10px 14px;font-size:13px;font-weight:1000;cursor:pointer}
    .listen-btn.secondary{background:white;color:var(--green-dark);border-color:#a8d488}
    .story-body{padding:27px 30px 24px}
    .story-en{font-family:var(--font-en);font-size:clamp(18px,1.75vw,21px);line-height:1.78;font-weight:600;color:#26344d;letter-spacing:-.004em;margin:0;max-width:68ch}
    .story-cn{font-size:15.5px;line-height:1.9;color:#69758a;margin:18px 0 0;padding-top:17px;border-top:2px dashed #dde5dc}
    details.shadowing{border-top:2px solid #e2ebdc;background:#fbfff7}
    details.shadowing summary{list-style:none;cursor:pointer;padding:16px 24px;font-size:14px;font-weight:1000;color:var(--green-dark);display:flex;align-items:center;justify-content:space-between}
    details.shadowing summary::-webkit-details-marker{display:none}details.shadowing summary:after{content:"＋";font-size:20px}details[open].shadowing summary:after{content:"−"}
    .sentence-list{display:grid;gap:9px;padding:0 20px 20px}
    .sentence{display:grid;grid-template-columns:36px 1fr auto;align-items:start;gap:10px;background:white;border:2px solid #dfe7db;border-radius:15px;padding:12px}
    .sentence-no{width:32px;height:32px;display:grid;place-items:center;border-radius:10px;background:var(--green-soft);color:var(--green-dark);font-weight:1000;font-size:12px}
    .sentence .en{font-size:15.5px}.sentence .cn{font-size:13.5px}

    .upgrade-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .upgrade-card{background:white;border:2px solid #ded4fa;border-radius:20px;box-shadow:0 5px 0 #e5dffa;overflow:hidden}
    .upgrade-card h4{margin:0;padding:15px 17px;background:var(--purple-soft);font-size:15px;color:var(--purple-dark);border-bottom:2px solid #e6defa}
    .upgrade-card h4 .en{font-family:var(--font-display);font-size:15px;line-height:1.3}.upgrade-card h4 .cn{font-size:12.5px;line-height:1.45;margin-top:3px;color:#75659d;font-weight:700}
    .upgrade-lines{padding:9px 16px 10px}
    .upgrade-line{display:grid;grid-template-columns:70px 1fr 44px;gap:8px;align-items:center;padding:10px 0}
    .upgrade-line+.upgrade-line{border-top:1px solid #ece8f6}
    .level{font-size:9px;font-weight:1000;letter-spacing:.05em;border-radius:12px;padding:5px 6px;text-align:center;background:#f1f2f5;color:#667085;line-height:1.25}
    .level .en,.level .cn{display:block;font-size:inherit;line-height:inherit;margin:0;color:inherit}
    .level.natural{color:#5d3db4;background:#eee8ff}.level.spoken{color:white;background:var(--purple)}
    .upgrade-copy .en{font-size:15px;line-height:1.45}.upgrade-copy .cn{font-size:12.5px;line-height:1.5;margin-top:3px}
    .mini-speak{width:44px;height:44px;border:2px solid #d9ccfa;border-bottom-width:4px;border-radius:50%;background:var(--purple-soft);color:var(--purple-dark);cursor:pointer;font-size:13px;font-weight:1000}
    .upgrade-note{margin:0 16px 16px;padding:11px 12px;border-radius:12px;background:#faf8ff;color:#6b6480;font-size:13px;line-height:1.6}

    .correction-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}
    .correction{background:white;border:2px solid #eedb78;border-radius:19px;box-shadow:0 5px 0 #f0e5ac;padding:16px}
    .pair{display:grid;gap:7px;margin-bottom:10px}.wrong,.right{font-size:15px;line-height:1.45;font-weight:800;border-radius:11px;padding:9px 11px}
    .wrong{background:#fff0f0;color:#b73737}.right{background:#edfbdf;color:#347f08}
    .wrong .en,.right .en{font-size:15px;line-height:1.45}.wrong .cn,.right .cn{font-size:12.5px;line-height:1.45;margin-top:3px;color:inherit}
    .correction-note .en{font-size:13.5px;line-height:1.6;font-weight:600;color:#52666c}.correction-note .cn{font-size:13px;line-height:1.65;color:var(--muted);margin-top:3px}

    .review-card{display:flex;align-items:center;justify-content:space-between;gap:18px;background:#24304a;color:white;border-radius:22px;padding:21px 23px;box-shadow:0 6px 0 #111a2c}
    .review-card h4{font-size:18px;margin:0 0 5px}.review-card p{color:#cfd8e8;margin:0;font-size:14px;line-height:1.55}.review-card p.cn{margin-top:4px;color:#adb9ce}
    .review-card button{flex:none;border:2px solid white;border-bottom-width:4px;border-radius:14px;background:white;color:#24304a;padding:10px 14px;font-weight:1000;cursor:pointer}
    footer{text-align:center;color:#8a94a6;font-size:12px;line-height:1.7;margin-top:54px}
    .hide-en .en,.hide-en .story-en{display:none}.hide-cn .cn,.hide-cn .story-cn,.hide-cn .lesson-cn{display:none}
    .hide-en .turn{grid-template-columns:42px 1fr}.hide-en .turn .speak-btn{display:none}
    .hide-en .sentence{grid-template-columns:36px 1fr}.hide-en .sentence .speak-btn{display:none}
    .hide-en .listen-group,.hide-en .mini-speak{display:none}.hide-en .upgrade-line{grid-template-columns:70px 1fr}
    .voice-toast{position:fixed;z-index:20;left:50%;bottom:24px;transform:translate(-50%,120px);opacity:0;background:#24304a;color:white;border-radius:999px;padding:11px 17px;font-size:13px;font-weight:800;box-shadow:0 8px 24px rgba(22,32,50,.2);transition:.25s}
    .voice-toast.show{transform:translate(-50%,0);opacity:1}
    @media(max-width:960px){.day-path{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media(max-width:760px){
      .app{padding:15px 13px 60px}.topbar{padding:0 2px}.brand small{display:none}.hero{padding:28px 22px 25px;border-radius:24px}.hero:after{font-size:62px}
      .day-path{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.day-tab{min-height:78px;padding:10px 5px;text-align:center}.day-num{width:auto;height:auto;margin-bottom:6px}.day-tab span:last-child{display:block}.day-tab span:last-child b{font-size:12px}.day-tab span:last-child small{display:none}
      .lesson-head{align-items:flex-start;flex-direction:column}.lang-controls{justify-content:flex-start}
      .exchange{padding:15px 13px}.turn{grid-template-columns:38px 1fr 40px;gap:9px}.avatar{width:37px;height:37px}.en{font-size:16px}.cn{font-size:14px}
      .story-top{align-items:flex-start;flex-direction:column;padding:17px}.story-body{padding:22px 19px}.story-en{font-size:18.5px;line-height:1.72}.story-cn{font-size:14.5px;line-height:1.8}
      .upgrade-grid,.correction-list{grid-template-columns:1fr}.upgrade-line{grid-template-columns:65px 1fr 44px}.review-card{align-items:flex-start;flex-direction:column}
    }
    @media(max-width:430px){
      .topbar{gap:8px}.brand{gap:8px;font-size:14px}.brand-mark{width:42px;height:42px;border-radius:13px}.streak{padding:7px 9px;font-size:12px}
      .hero{padding:31px 20px 30px}.hero h1{font-size:43px;line-height:.98;margin-top:22px}.hero p{font-size:15px;line-height:1.7}.hero-meta{gap:7px}.meta-pill{font-size:11px;padding:7px 9px}
      .lesson-head h2{font-size:34px}.lesson-head .lesson-cn{font-size:15px}.toggle{min-height:44px}.section{margin:30px 0 40px}.section-title h3{font-size:26px}
      .turn{grid-template-columns:36px minmax(0,1fr) 44px}.avatar{width:35px;height:35px}.speak-btn{width:44px;height:44px}.en{overflow-wrap:anywhere}
      .story-top .listen-group{width:100%}.listen-btn{flex:1;min-height:44px}.story-en{font-size:18px}.sentence-list{padding-inline:12px}.sentence{grid-template-columns:31px minmax(0,1fr) 44px;padding:10px 8px;gap:8px}.sentence-no{width:29px;height:29px}
      .upgrade-card h4{font-size:14px}.upgrade-lines{padding-inline:12px}.upgrade-line{grid-template-columns:61px minmax(0,1fr) 44px;gap:6px}.level{font-size:9px;padding-inline:5px}
    }
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><div class="brand-mark">🗣️</div><div>Jason's English Journal<small>Speak · Repeat · Remember</small></div></div>
      <div class="streak">🔥 7 DAYS</div>
    </header>

    <section class="hero">
      <span class="eyebrow">Speak · Repeat · Own It</span>
      <h1>Your real life,<br>in real English.</h1>
      <p>把真实的生活经历练成脱口而出的英语。每天先复习，再开口，最后讲成完整故事。</p>
    </section>

    <nav class="day-path" id="dayPath" aria-label="选择学习日期"></nav>
    <section id="lesson"></section>
    <footer>Jason's English Journal · Built from your real conversations<br>每天慢读三遍，再关掉中文完整复述一遍。</footer>
  </main>
  <div class="voice-toast" id="voiceToast" role="status">正在朗读…</div>

  <script>
    const lessons = [
      {
        label:"DAY 01", short:"Introduce yourself", titleEn:"Nice to meet you, Jason.", title:"自我介绍、兴趣、电影与徒步",
        qa:[
          ["Hi, nice to meet you. Could you tell me a little about yourself?","嗨，很高兴认识你。可以简单介绍一下自己吗？","Hi, I'm Jason. I'm from Neijiang, Sichuan, China.","嗨，我叫 Jason。我来自中国四川内江。"],
          ["What do you like to do in your free time?","你空闲的时候喜欢做什么？","I enjoy listening to music and watching movies. I especially like pop music and romantic movies.","我喜欢听音乐和看电影。我尤其喜欢流行音乐和爱情电影。"],
          ["Why do you like watching movies?","你为什么喜欢看电影？","Because watching movies helps me relax.","因为看电影可以帮助我放松。"],
          ["What kind of movies do you usually watch?","你平时喜欢看什么类型的电影？","I like romantic movies, and I also watch a lot of American movies.","我喜欢爱情电影，也经常看美国电影。"],
          ["Do you like hiking?","你喜欢徒步吗？","I've never been hiking, but I'd love to try it.","我以前从来没有去徒步过，不过我很想试试。"],
          ["You sound tired. Are you going to bed?","听起来你有点累。你要去睡觉了吗？","Yeah, I'm really tired. I'm going to bed now. Maybe we can practice English again tomorrow.","对，我真的很累。我现在要去睡觉了。也许我们明天可以再练英语。"]
        ],
        story:{
          en:"Hi, I'm Jason. I'm from Neijiang, Sichuan, China. In my free time, I enjoy listening to music and watching movies. I especially like pop music and romantic movies, and I also watch a lot of American movies. Watching movies helps me relax. I've never been hiking, but I'd love to try it someday. I'm really tired now, so I'm going to bed. Maybe we can practice English again tomorrow.",
          cn:"嗨，我叫 Jason，来自中国四川内江。空闲的时候，我喜欢听音乐和看电影。我尤其喜欢流行音乐和爱情电影，也经常看美国电影。看电影可以帮助我放松。我以前从来没有去徒步过，不过以后很想试试。我现在真的很累，所以准备去睡觉了。也许我们明天可以再练习英语。",
          sentences:[
            ["Hi, I'm Jason. I'm from Neijiang, Sichuan, China.","嗨，我叫 Jason，来自中国四川内江。"],
            ["In my free time, I enjoy listening to music and watching movies.","空闲的时候，我喜欢听音乐和看电影。"],
            ["I especially like pop music and romantic movies, and I also watch a lot of American movies.","我尤其喜欢流行音乐和爱情电影，也经常看美国电影。"],
            ["Watching movies helps me relax.","看电影可以帮助我放松。"],
            ["I've never been hiking, but I'd love to try it someday.","我以前从来没有去徒步过，不过以后很想试试。"],
            ["I'm really tired now, so I'm going to bed. Maybe we can practice English again tomorrow.","我现在真的很累，所以准备去睡觉了。也许我们明天可以再练习英语。"]
          ]
        },
        upgrades:[
          {title:"表达喜欢看电影",lines:[["基础","I like watching movies.","我喜欢看电影。"],["更自然","I enjoy watching movies.","我很享受看电影。"],["更口语","I'm really into movies.","我非常喜欢电影。"]],noteEn:"‘Be into something’ is a casual way to say you are very interested in it.",note:"be into something = 对某件事很感兴趣，是很日常的口语表达。"},
          {title:"表达看电影让我放松",lines:[["自然","Watching movies helps me relax.","看电影让我放松。"],["自然","Watching movies helps me feel relaxed.","看电影让我感觉很放松。"]],noteEn:"Relax is a verb; relaxed is an adjective. Do not say ‘helps me feel relax.’",note:"relax 是动词；relaxed 是形容词。不要说 “helps me feel relax”。"},
          {title:"表达还没尝试过徒步",lines:[["基础","I haven't tried hiking yet.","我还没有尝试过徒步。"],["更口语","I've never been hiking, but I'd love to try it.","我从来没有去徒步过，不过我很想试试。"]],noteEn:"‘I'd love to try it’ sounds softer and more conversational than ‘I want to try it.’",note:"I'd love to try it 比 I want to try it 更柔和、更像聊天。"},

          {title:"表达早餐吃面",lines:[["自然","I'm going to have noodles for breakfast.","我早餐准备吃面。"],["更自然","I'm having noodles for breakfast.","我早餐吃面。"],["更口语","I'm grabbing some noodles for breakfast.","我准备快速吃碗面当早餐。"]],noteEn:"‘Have noodles’ best matches a planned meal. ‘Grab some noodles’ sounds quicker and more casual.",note:"计划好好吃一顿时 have noodles 最贴切；grab some noodles 更像快速去吃一点。"},
          {title:"表达去银行办事",lines:[["自然","I need to take care of something at the bank.","我需要去银行办点事情。"],["更自然","I have something to take care of at the bank.","我在银行有点事情要办。"],["更口语","I need to run an errand at the bank.","我得去银行办个事。"]],noteEn:"‘Take care of something’ is useful when you do not need to explain the exact business.",note:"不需要说明具体办什么事情时，take care of something 很实用。"},
          {title:"表达游泳时长",lines:[["自然","I'll probably swim for about an hour.","我大概会游一个小时。"],["自然","I'm planning to swim for about an hour.","我计划游大约一个小时。"],["更口语","I'll probably get in about an hour of swimming.","我大概能游上一个小时。"]],noteEn:"Use ‘for’ before a duration: for an hour, for half an hour.",note:"表示持续时长要用 for：for an hour、for half an hour。"},
          {title:"表达送妈妈回家",lines:[["首选","I took my mom home.","我送妈妈回家了。"],["更具体","I dropped my mom off at home.","我开车把妈妈送到家了。"]],noteEn:"Use ‘I took my mom home’ as the simple everyday choice. ‘Dropped her off’ specifically highlights the ride and leaving her at the destination.",note:"日常首选 I took my mom home；drop her off 更具体地强调开车送到目的地后离开。"},

        story:{
          en:"Last night, I stayed up studying English on my tablet because I want to speak more naturally. I want to say everything in English, but I don't always know how. It's been so hot lately, so I had the AC on while I studied. I didn't want to stay up too late, so I finally went to bed. This morning, I slept in, and it felt really good, although I was still a little sleepy. After work, I skipped swimming because I had to work late. On my way home, I stopped at a red light. When I reached the underground garage, the signal was pretty bad. I decided to keep practicing English when I got home.",
          cn:"昨晚我熬夜用平板学英语，因为我想说得更自然。我想把所有事情都用英语说出来，但有时不知道该怎么说。最近天气太热了，所以学习时我开着空调。我不想熬得太晚，于是终于去睡觉了。今天早上我睡了个懒觉，感觉很舒服，不过还是有点困。下班后我没有去游泳，因为我不得不加班。回家的路上，我遇到了红灯。到地下车库后，信号很差。我决定回家后继续练英语。",

        upgrades:[
          {title:"表达用平板学英语",lines:[["基础","I'm studying English on my tablet right now.","我现在正在用平板学英语。"],["首选","I'm studying English on my tablet because I want to speak more naturally.","我正在用平板学英语，因为我想说得更自然。"],["更口语","I'm using my tablet to work on my English.","我正在用平板提升英语。"]],noteEn:"Use ‘on my tablet’ for the device or platform you are using, not ‘with my tablet.’",note:"表示使用某个设备或平台时用 on my tablet，不用 with my tablet。"},
          {title:"表达不知道怎么用英语说",lines:[["基础","I don't know how to say it in English.","我不知道这个用英语怎么说。"],["自然","I want to say everything in English, but I don't always know how.","我想把所有事情都用英语说出来，但有时不知道该怎么说。"],["更口语","I know what I want to say—I just don't know how to say it in English.","我知道自己想说什么，只是不知道怎样用英语表达。"]],noteEn:"The short phrase ‘I don't know how’ works when the action is already clear from the conversation.",note:"当上下文已经说明是什么事情时，可以直接用简短的 I don't know how。"},
          {title:"表达还没睡与不想熬夜",lines:[["自然","I haven't gone to bed yet.","我还没有睡觉。"],["自然","I don't want to stay up late every night.","我不想每天晚上都熬夜。"],["更口语","I really need to call it a night.","我真的该结束今天、去睡觉了。"]],noteEn:"‘Stay up late’ means remaining awake late. After every, use the singular form: every night.",note:"stay up late 表示熬夜；every 后接单数，所以是 every night。"},
          {title:"表达最近很热与开空调",lines:[["自然","It's been so hot lately.","最近实在太热了。"],["首选","I've got the AC on right now.","我现在开着空调。"],["更口语","I'm enjoying the AC right now.","我现在正舒服地吹着空调。"]],noteEn:"Air conditioning is the cooling system, not a place you are ‘in.’ In everyday speech, ‘AC’ is the natural short form.",note:"air conditioning 是制冷系统，不是一个可以待在里面的地点；日常口语常直接说 AC。"},
          {title:"表达睡懒觉与还很困",lines:[["自然","I slept in, and it felt really good.","我睡了个懒觉，感觉很舒服。"],["更口语","I finally got to sleep in.","我终于可以睡个懒觉了。"],["自然","I'm still a little sleepy.","我现在还是有点困。"],["更口语","I'm not much of a morning person.","我不太是个早起型的人。"]],noteEn:"‘Sleep in’ means sleeping later than usual. It does not mean going to bed late.",note:"sleep in 表示比平时晚起床，不表示很晚才睡。"},
          {title:"表达加班所以没游泳",lines:[["自然","I didn't go swimming today because I had to work late.","我今天没去游泳，因为我不得不加班。"],["更口语","I skipped swimming because I had to work late.","我因为加班，今天就没去游泳。"]],noteEn:"‘Work late’ means working later than your usual finishing time. ‘Skip’ is a concise way to say you did not do a planned activity.",note:"work late 表示工作到比平时更晚；skip 可以简洁表达没有进行原定活动。"},

      {
        label:"DAY 06", short:"Mom & swimming", titleEn:"From breakfast buns to a silent swim.", title:"给同事买早餐、去妈妈家吃饭与没有耳机的游泳",
        qa:[
          ["How did you feel this morning?","你今天早上感觉怎么样？","I felt sleepy because I went to bed late.","我觉得很困，因为昨晚睡得很晚。"],
          ["What did you do before driving to work?","开车上班前你做了什么？","I got ready to head out, took the elevator down, and pulled out of the parking garage.","我准备好出门，坐电梯下楼，然后把车开出了停车场。"],
          ["Did you stop anywhere on your way to work?","上班路上你中途停过吗？","Yes. I picked up steamed buns, rice porridge, and braised eggs for my coworkers.","停过。我给同事买了包子、粥和卤蛋。"],
          ["Which floor is your office on?","你们公司在几楼？","Our office is on the twenty-third floor.","我们公司在二十三楼。"],
          ["What did you do after the morning shift?","上午的工作结束后你做了什么？","At noon, I drove to my mom's for lunch. I was happy because I hadn't seen her in two days.","中午我开车去妈妈家吃饭。我很开心，因为我已经两天没见到她了。"],
          ["Does your mom have any pets?","你妈妈养宠物了吗？","Yes. She has four little dogs: Yuanyuan, Laifu, Wangwang, and Caicai. Yuanyuan is female, and the other three are male.","养了。她有四只小狗：圆圆、来福、旺旺和财财。圆圆是母狗，另外三只是公狗。"],
          ["What did you do after lunch?","午饭后你做了什么？","After lunch, I headed back to work.","午饭后，我回去上班了。"],

          ["Did anything go wrong at the pool?","在游泳馆遇到什么问题了吗？","When I got there, I realized my swimming headphones were dead. I still went swimming, but I swam without them.","到了以后，我发现游泳耳机没电了。我还是游了泳，只是没有戴耳机。"],
          ["Do you usually wear headphones while swimming?","你平时游泳会戴耳机吗？","Yes. I usually listen to music while I swim.","会。我平时喜欢一边游泳一边听音乐。"],
          ["What did you do later that evening?","那天晚上晚些时候你做了什么？","I had noodles for dinner and then washed the dishes. The plate and bowl were greasy, and I was sweating buckets.","我晚饭吃了面，然后洗了碗。盘子和碗都很油，我还满头大汗。"]

        story:{
          en:"This morning, I felt sleepy because I went to bed late. I got ready to head out, took the elevator down, and pulled out of the parking garage. On my way to work, I picked up steamed buns, rice porridge, and braised eggs for my coworkers. When I arrived, I went up to the twenty-third floor, where our office is. At noon, I drove to my mom's for lunch. I was happy to see her because I hadn't seen her in two days. She has four little dogs: Yuanyuan, Laifu, Wangwang, and Caicai. Yuanyuan is female, and the other three are male. After lunch, I headed back to work. After work, I drove to the swimming pool. When I got there, I realized my swimming headphones were dead. I still went swimming, but I swam without them. I usually listen to music while I swim. Later, I had noodles for dinner and washed the dishes. The plate and bowl were greasy, and I was sweating buckets.",
          cn:"今天早上我觉得很困，因为昨晚睡得很晚。我准备好出门，坐电梯下楼，然后把车开出了停车场。上班路上，我给同事买了包子、粥和卤蛋。到公司后，我上到二十三楼，我们的办公室就在那里。中午，我开车去妈妈家吃饭。见到她我很开心，因为我已经两天没见到她了。她养了四只小狗：圆圆、来福、旺旺和财财。圆圆是母狗，另外三只是公狗。午饭后，我回去上班。下班后，我开车去了游泳馆。到了以后，我发现游泳耳机没电了。我还是游了泳，只是没有戴耳机。我平时喜欢一边游泳一边听音乐。后来，我晚饭吃了面，然后洗了碗。盘子和碗都很油，我还满头大汗。",

            ["Later, I had noodles for dinner and washed the dishes.","后来，我晚饭吃了面，然后洗了碗。"],

            "noteEn": "Use get ready to plus a verb.",
            "note": "get ready 后接动作时，用 to + 动词原形。"
          },
          {
            "wrong": "✕ I pulling into the garage.",
            "wrongCn": "✕ 我正在开进车库。（错误表达）",
            "right": "✓ I'm pulling into the garage.",
            "rightCn": "✓ 我正在开进车库。",
            "noteEn": "The present continuous needs am, is, or are.",
            "note": "现在进行时需要 am、is 或 are。"
          },
          {
            "wrong": "✕ I'm waiting to a red light.",
            "wrongCn": "✕ 我在等红灯。（错误表达）",
            "right": "✓ I'm at a red light.",
            "rightCn": "✓ 我在一个红灯前。",
            "noteEn": "Use at for your position at a traffic light.",
            "note": "表示位于红灯前，用介词 at。"
          },
          {
            "wrong": "✕ Today sunset is amazing.",
            "wrongCn": "✕ 今天夕阳很美。（错误表达）",
            "right": "✓ Today's sunset is amazing.",
            "rightCn": "✓ 今天的夕阳很美。",
            "noteEn": "Today's is possessive and means the sunset of today.",
            "note": "today's 是所有格，表示“今天的”。"
          },
          {
            "wrong": "✕ It's no spicy.",
            "wrongCn": "✕ 它不辣。（错误表达）",
            "right": "✓ It's not spicy.",
            "rightCn": "✓ 它不辣。",
            "noteEn": "Use not before an adjective.",
            "note": "形容词前表示否定用 not。"
          },
          {
            "wrong": "✕ Gas prices are grow up after midnight.",
            "wrongCn": "✕ 油价过了午夜上涨。（错误表达）",
            "right": "✓ Gas prices go up after midnight.",
            "rightCn": "✓ 油价过了午夜会上涨。",
            "noteEn": "Prices go up. Grow up is mainly used for children becoming adults.",
            "note": "价格上涨用 go up；grow up 主要表示孩子长大成人。"
          },
          {
            "wrong": "✕ I'm gonna to my mom's place.",
            "wrongCn": "✕ 我要去妈妈家。（错误表达）",
            "right": "✓ I'm gonna go to my mom's place.",
            "rightCn": "✓ 我要去妈妈家。",
            "noteEn": "Gonna means going to, so it must be followed by a verb such as go.",
            "note": "gonna 等于 going to，后面还需要接动词，如 go。"
          },
          {
            "wrong": "✕ I'm about to arrive to my mom's place.",
            "wrongCn": "✕ 我马上到妈妈家。（错误表达）",
            "right": "✓ I'm about to arrive at my mom's place.",
            "rightCn": "✓ 我马上就要到妈妈家了。",
            "noteEn": "Arrive takes at for a specific place. In conversation, I'm almost at my mom's place is simpler.",
            "note": "到达具体地点用 arrive at；口语中 I'm almost at my mom's place 更简单。"
          },
          {
            "wrong": "✕ I'm waiting the elevator.",
            "wrongCn": "✕ 我在等电梯。（错误表达）",
            "right": "✓ I'm waiting for the elevator.",
            "rightCn": "✓ 我在等电梯。",
            "noteEn": "Wait needs for before the person or thing you are waiting for.",
            "note": "wait 后接等待的人或事物时要加 for。"
          },
          {
            "wrong": "✕ Our office is at the twenty-third floor.",
            "wrongCn": "✕ 我们办公室在二十三楼。（错误表达）",
            "right": "✓ Our office is on the twenty-third floor.",
            "rightCn": "✓ 我们办公室在二十三楼。",
            "noteEn": "Use on with floors of a building.",
            "note": "表示位于某一楼层，用介词 on。"
          }
        ],
        "reviewEn": "Retell the day in this order: reviewing earlier English, leaving home and the garage, having noodles for breakfast, finishing the morning shift, driving to your mom's for lunch, heavy traffic and cooler weather, returning to work, seeing string lights and the sunset, eating hot pot with friends, thinking about gas prices, helping your mom open an account, and heading home.",
        "review": "按这个顺序复述：复习以前的英语、出门和开出车库、早餐吃面、结束上午工作、开车去妈妈家吃午饭、交通拥堵和天气凉快、返回公司、看到彩灯和夕阳、与朋友吃火锅、想到油价、帮妈妈开户，以及回家。"
      }
    ];

    let current = Math.min(Number(localStorage.getItem("jason-day") || 0),lessons.length-1);
    let showEn = true, showCn = true;
    const lessonEl = document.getElementById("lesson");
    const pathEl = document.getElementById("dayPath");

    const esc = value => String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const speechAttr = text => encodeURIComponent(text);
    const speakButton = (text, mini=false) => `<button class="${mini?'mini-speak':'speak-btn'}" data-speak="${speechAttr(text)}" aria-label="播放英文发音">▶</button>`;
    const levelEn={"基础":"Basic","自然":"Natural","更自然":"More natural","更口语":"Conversational","标准":"Standard","首选":"Best choice","更具体":"More specific","开进去":"Pulling in","正在停":"Parking","已停好":"Parked","正式一点":"More formal","已发生":"Completed","正在发生":"Happening now","即将发生":"About to happen","更准确":"More precise"};
    const upgradeTitleEn={
      "表达喜欢看电影": "Talking about movies",
      "表达看电影让我放松": "Movies help me relax",
      "表达还没尝试过徒步": "Hiking I haven't tried",
      "表达很累，要睡觉": "Tired and going to bed",
      "问“你在干什么”": "Asking what someone is doing",
      "表达正在喝可乐": "Having a Coke",
      "表达简单吃点东西": "Having a light snack",
      "表达点外卖": "Ordering food",
      "表达正在做项目": "Working on a project",
      "表达夜猫子与睡懒觉": "Night owls and sleeping in",
      "表达游了一千六百米": "Swimming sixteen hundred meters",
      "表达去妈妈那里": "Going to my mom's place",
      "表达顺道去拿东西": "Stopping by to pick something up",
      "表达正在回家": "Heading home",
      "表达进入车库与停车": "Pulling in and parking",
      "表达偶然碰见": "Running into someone",
      "表达当时不方便说话": "Not being able to talk",
      "表达准备出门上班": "Getting ready and heading out",
      "表达正在上班路上": "On the way to work",
      "表达开车注意安全": "Wishing someone a safe drive",
      "表达早餐吃面": "Having noodles for breakfast",
      "表达去银行办事": "Taking care of something at the bank",
      "表达游泳时长": "Talking about swimming time",
      "表达送妈妈回家": "Taking my mom home",
      "表达累坏了准备休息": "Feeling exhausted and going to bed",
      "表达用平板学英语": "Studying English on a tablet",
      "表达不知道怎么用英语说": "Not knowing how to say it",
      "表达还没睡与不想熬夜": "Still awake and staying up late",
      "表达最近很热与开空调": "Hot weather and the AC",
      "表达睡懒觉与还很困": "Sleeping in and feeling sleepy",
      "表达加班所以没游泳": "Working late and skipping swimming",
      "表达停车等红灯": "Waiting at a red light",
      "表达信号不好": "Having a weak signal",
      "表达困倦与晚睡": "Feeling sleepy after a late night",
      "表达给同事买早餐": "Buying breakfast for coworkers",
      "表达公司所在楼层": "Talking about the office floor",
      "表达去妈妈家吃午饭": "Having lunch at my mom's",
      "表达宠物的性别": "Talking about male and female pets",
      "表达耳机没电": "Headphones with a dead battery",
      "表达没戴耳机游泳": "Swimming without headphones",
      "表达吃完饭与洗碗": "Finishing dinner and washing dishes",
      "表达油腻与满头大汗": "Greasy dishes and heavy sweating",
      "表达股票下跌": "Stocks going down",
      "表达复习以前的英语": "Reviewing earlier English",
      "表达准备出门与上路": "Getting ready and heading out",
      "表达开出或开进车库": "Pulling out and pulling in",
      "表达红灯与拥堵": "Red lights and heavy traffic",
      "表达天气更凉快": "Cooler weather",
      "表达街灯与夕阳": "Street lights and the sunset",
      "表达清汤牛肉火锅": "Clear-broth beef hot pot",
      "表达加油与涨价": "Getting gas and rising prices",
      "表达本来应该做某事": "What I was supposed to do",
      "表达股票账户": "Opening an investment account",
      "表达快到与回家": "Almost there and heading home"
    };

    function renderPath(){
      pathEl.innerHTML = lessons.map((d,i)=>`<button class="day-tab ${i===current?'active':''}" data-day="${i}" aria-current="${i===current?'page':'false'}"><span class="day-num">${d.label}</span><span><b>${d.short}</b></span></button>`).join("");
    }

    function render(shouldScroll=false){
      const d=lessons[current];
      renderPath();
      lessonEl.innerHTML=`
        <header class="lesson-head">
          <div><div class="lesson-kicker">${d.label} · REAL CONVERSATION</div><h2>${d.titleEn}</h2><p class="lesson-cn">${d.title}</p></div>
          <div class="lang-controls"><button class="toggle ${showEn?'on':''}" data-toggle="en">EN 英文</button><button class="toggle ${showCn?'on':''}" data-toggle="cn">中 中文</button></div>
        </header>

        <section class="section" id="dialogue">
          <div class="section-title"><div><span class="section-kicker">Question & Answer</span><h3>Ask. Answer. Repeat.</h3><p>标准中英文对话：先听老师的问题，再用 Jason 的回答练习自然接话。</p></div></div>
          <div class="dialogue-list">${d.qa.map((q)=>`
            <article class="exchange">
              <div class="turn coach"><div class="avatar">C</div><div><div class="speaker">Coach</div><div class="en">${esc(q[0])}</div><div class="cn">${esc(q[1])}</div></div>${speakButton(q[0])}</div>
              <div class="turn jason"><div class="avatar">J</div><div><div class="speaker">Jason</div><div class="en">${esc(q[2])}</div><div class="cn">${esc(q[3])}</div></div>${speakButton(q[2])}</div>
            </article>`).join("")}</div>
        </section>

        <section class="section" id="story">
          <div class="section-title"><div><span class="section-kicker">Your Connected Story</span><h3>Tell it like it happened.</h3><p>今日完整故事：把零散回答串成一段真正能说出口的话。</p></div></div>
          <article class="story-card">
            <div class="story-top"><div><b>Natural Story</b><small>先听整段，再打开逐句跟读</small></div><div class="listen-group"><button class="listen-btn" data-speak="${speechAttr(d.story.en)}" data-rate="0.92">▶ 听整段</button><button class="listen-btn secondary" data-speak="${speechAttr(d.story.en)}" data-rate="0.78">▶ 慢速</button></div></div>
            <div class="story-body"><p class="story-en">${esc(d.story.en)}</p><p class="story-cn">${esc(d.story.cn)}</p></div>
            <details class="shadowing"><summary>打开逐句跟读模式</summary><div class="sentence-list">${d.story.sentences.map((s,i)=>`<div class="sentence"><span class="sentence-no">${String(i+1).padStart(2,'0')}</span><div><div class="en">${esc(s[0])}</div><div class="cn">${esc(s[1])}</div></div>${speakButton(s[0])}</div>`).join("")}</div></details>
          </article>
        </section>

        <section class="section" id="upgrades">
          <div class="section-title"><div><span class="section-kicker">Sound More Natural</span><h3>Upgrade your English.</h3><p>地道表达升级：紫色标签是更值得积累的口语版本，先选最顺口的一句。</p></div></div>
          <div class="upgrade-grid">${d.upgrades.map(u=>`<article class="upgrade-card"><h4><span class="en">${esc(upgradeTitleEn[u.title]||u.title)}</span><span class="cn">${esc(u.title)}</span></h4><div class="upgrade-lines">${u.lines.map(line=>`<div class="upgrade-line"><span class="level ${line[0].includes('口语')?'spoken':line[0].includes('自然')?'natural':''}"><span class="en">${esc(levelEn[line[0]]||line[0])}</span><span class="cn">${esc(line[0])}</span></span><div class="upgrade-copy"><div class="en">${esc(line[1])}</div><div class="cn">${esc(line[2])}</div></div>${speakButton(line[1],true)}</div>`).join("")}</div><div class="upgrade-note"><div class="en">💡 ${esc(u.noteEn)}</div><div class="cn">${esc(u.note)}</div></div></article>`).join("")}</div>
        </section>

        <section class="section" id="corrections">
          <div class="section-title"><div><span class="section-kicker">Quick Fixes</span><h3>Remember the pattern.</h3><p>关键纠错：只记住“为什么”和正确整句，不需要死背语法术语。</p></div></div>
          <div class="correction-list">${d.corrections.map(c=>`<article class="correction"><div class="pair"><div class="wrong"><div class="en">${esc(c.wrong)}</div><div class="cn">${esc(c.wrongCn)}</div></div><div class="right"><div class="en">${esc(c.right)}</div><div class="cn">${esc(c.rightCn)}</div></div></div><div class="correction-note"><div class="en">${esc(c.noteEn)}</div><div class="cn">${esc(c.note)}</div></div></article>`).join("")}</div>
        </section>

        <section class="section"><div class="review-card"><div><h4>🎯 Today's Retelling · 今日复述任务</h4><p class="en">${esc(d.reviewEn)}</p><p class="cn">${esc(d.review)}</p></div><button data-speak="${speechAttr(d.story.en)}" data-rate="0.82">▶ 再听一次</button></div></section>`;
      applyLanguages();
      if(shouldScroll) window.scrollTo({top:pathEl.offsetTop-12,behavior:"smooth"});
    }

    function applyLanguages(){
      document.body.classList.toggle("hide-en",!showEn);
      document.body.classList.toggle("hide-cn",!showCn);
    }

    let fixedVoiceURI=localStorage.getItem("jason-fixed-voice")||"";
    function preferredDeviceVoice(voices){
      const saved=voices.find(v=>v.voiceURI===fixedVoiceURI);
      if(saved) return saved;
      const scored=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en")).map(v=>{
        let score=v.lang.toLowerCase().startsWith("en-us")?100:30;
        if(/premium/i.test(v.name)) score+=1000;
        if(/enhanced/i.test(v.name)) score+=900;
        if(/natural|neural/i.test(v.name)) score+=800;
        if(/ava/i.test(v.name)) score+=160;
        if(/zoe/i.test(v.name)) score+=150;
        if(/samantha/i.test(v.name)) score+=140;
        if(/allison/i.test(v.name)) score+=130;
        if(/google us english|microsoft.*online/i.test(v.name)) score+=120;
        return {voice:v,score};
      }).sort((a,b)=>b.score-a.score);
      const selected=scored[0]?.voice||null;
      if(selected){fixedVoiceURI=selected.voiceURI;localStorage.setItem("jason-fixed-voice",fixedVoiceURI)}
      return selected;
    }

    function speak(text,rate=.92,allowVoiceWait=true){
      if(!("speechSynthesis" in window)){showToast("当前浏览器不支持朗读");return;}
      speechSynthesis.cancel();
      const voices=speechSynthesis.getVoices();
      if(!voices.length&&allowVoiceWait){
        showToast("正在准备统一语音…");
        let resumed=false;
        const resume=()=>{if(resumed)return;resumed=true;speechSynthesis.removeEventListener("voiceschanged",resume);speak(text,rate,false)};
        speechSynthesis.addEventListener("voiceschanged",resume);
        setTimeout(resume,700);
        return;
      }
      const utterance=new SpeechSynthesisUtterance(text);
      utterance.voice=preferredDeviceVoice(voices);
      utterance.lang="en-US";utterance.rate=rate;utterance.pitch=1;
      utterance.onstart=()=>showToast(rate<.8?"慢速朗读中…":"正在朗读…");
      utterance.onend=()=>hideToast();utterance.onerror=()=>hideToast();
      speechSynthesis.speak(utterance);
    }
    let toastTimer;
    function showToast(message){const el=document.getElementById("voiceToast");el.textContent=message;el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(hideToast,5000)}
    function hideToast(){document.getElementById("voiceToast").classList.remove("show")}

    document.addEventListener("click",e=>{
      const day=e.target.closest("[data-day]");
      if(day){current=Number(day.dataset.day);localStorage.setItem("jason-day",current);if("speechSynthesis" in window) window.speechSynthesis.cancel();render(true);return}
      const toggle=e.target.closest("[data-toggle]");
      if(toggle){if(toggle.dataset.toggle==="en"){if(showEn&&!showCn)return;showEn=!showEn}else{if(showCn&&!showEn)return;showCn=!showCn}render(false);return}
      const audio=e.target.closest("[data-speak]");
      if(audio)speak(decodeURIComponent(audio.dataset.speak),Number(audio.dataset.rate||.92));
    });
    render();
  </script>
</body>
</html>
