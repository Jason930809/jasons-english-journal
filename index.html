<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#58cc02">
  <meta name="description" content="Jason's English Journal — 三天真实生活口语练习">
  <title>Jason's English Journal</title>
  <style>
    :root{
      --green:#58cc02;--green-dark:#46a302;--green-soft:#efffdf;
      --blue:#1cb0f6;--blue-dark:#168ac0;--blue-soft:#eaf8ff;
      --purple:#8b5cf6;--purple-dark:#6d43d4;--purple-soft:#f3efff;
      --yellow:#ffc800;--yellow-soft:#fff8d8;--red:#ff4b4b;
      --ink:#24304a;--muted:#68738a;--line:#dbe3ee;--paper:#fffef9;--page:#f7f8f3;
      --shadow:0 5px 0 #dce3e8;--radius:22px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;color:var(--ink);background:
      radial-gradient(circle at 15% 8%,rgba(88,204,2,.10),transparent 28rem),
      radial-gradient(circle at 88% 20%,rgba(28,176,246,.09),transparent 30rem),var(--page);
      font-family:"Avenir Next","Nunito","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      -webkit-font-smoothing:antialiased}
    button{font:inherit}
    button:focus-visible,summary:focus-visible{outline:4px solid rgba(28,176,246,.25);outline-offset:3px}
    .app{max-width:1080px;margin:auto;padding:22px 22px 80px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.02em}
    .brand-mark{width:48px;height:48px;border-radius:15px;background:var(--green);color:white;display:grid;place-items:center;
      font-size:25px;border:2px solid var(--green-dark);box-shadow:0 4px 0 var(--green-dark);transform:rotate(-3deg)}
    .brand small{display:block;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
    .streak{display:flex;align-items:center;gap:7px;color:#d98800;font-weight:900;background:#fff7d6;border:2px solid #f2d765;border-radius:999px;padding:9px 13px}
    .hero{position:relative;overflow:hidden;border:2px solid #b7e593;background:linear-gradient(135deg,#f5ffe8 0%,#ffffff 56%,#eaf8ff 100%);
      border-radius:30px;padding:36px 38px 32px;box-shadow:0 7px 0 #d9e9ce;margin-bottom:26px}
    .hero:after{content:"A  B  C";position:absolute;right:-15px;bottom:-28px;font-size:90px;font-weight:1000;letter-spacing:-.08em;color:rgba(88,204,2,.07);transform:rotate(-5deg)}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--green-dark);font-size:13px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
    .eyebrow:before{content:"";width:24px;height:5px;border-radius:9px;background:var(--green)}
    h1{font-size:clamp(32px,6vw,58px);line-height:1.02;letter-spacing:-.055em;margin:14px 0 12px;max-width:760px}
    .hero p{font-size:17px;line-height:1.75;color:var(--muted);max-width:690px;margin:0}
    .hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
    .meta-pill{background:white;border:2px solid var(--line);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800}

    .day-path{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
    .day-tab{min-height:76px;background:white;border:2px solid var(--line);border-bottom-width:5px;border-radius:18px;padding:12px 16px;
      color:var(--muted);cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:.18s transform,.18s border-color,.18s background}
    .day-tab:hover{transform:translateY(-2px)}
    .day-tab.active{border-color:var(--green);background:var(--green-soft);color:var(--ink)}
    .day-num{width:40px;height:40px;flex:none;border-radius:50%;display:grid;place-items:center;font-size:16px;font-weight:1000;background:#edf0f4;color:#7b8596}
    .active .day-num{color:white;background:var(--green);box-shadow:0 3px 0 var(--green-dark)}
    .day-tab b{display:block;font-size:15px;line-height:1.25}.day-tab span:last-child small{display:block;margin-top:4px;font-size:12px;color:var(--muted)}

    .lesson-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding:6px 2px 18px;border-bottom:2px dashed #d6dde6;margin-bottom:22px}
    .lesson-kicker{font-size:12px;text-transform:uppercase;letter-spacing:.13em;color:var(--green-dark);font-weight:1000}
    .lesson-head h2{font-size:clamp(26px,4vw,39px);line-height:1.12;letter-spacing:-.035em;margin:6px 0 0}
    .lang-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .toggle{border:2px solid var(--line);border-bottom-width:4px;background:white;color:var(--ink);border-radius:13px;padding:9px 12px;font-size:13px;font-weight:900;cursor:pointer}
    .toggle.on{border-color:var(--green);background:var(--green-soft);color:var(--green-dark)}

    .section{margin:34px 0 46px;scroll-margin-top:18px}
    .section-title{display:flex;align-items:center;gap:13px;margin-bottom:16px}
    .section-icon{width:44px;height:44px;border-radius:14px;color:white;display:grid;place-items:center;font-size:21px;font-weight:1000;box-shadow:0 4px 0 rgba(30,40,60,.15)}
    .section-title h3{font-size:23px;letter-spacing:-.025em;margin:0}.section-title p{font-size:13px;color:var(--muted);margin:3px 0 0;line-height:1.45}
    .dialogue-icon{background:var(--blue)}.story-icon{background:var(--green)}.upgrade-icon{background:var(--purple)}.fix-icon{background:var(--yellow);color:#785900}

    .dialogue-list{display:grid;gap:13px}
    .exchange{background:white;border:2px solid var(--line);border-radius:var(--radius);padding:18px 18px 17px;box-shadow:var(--shadow)}
    .turn{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:start}
    .turn+.turn{margin-top:15px;padding-top:15px;border-top:2px dashed #e5e9ef}
    .avatar{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;color:white;font-size:13px;font-weight:1000}
    .coach .avatar{background:var(--blue);box-shadow:0 3px 0 var(--blue-dark)}.jason .avatar{background:var(--green);box-shadow:0 3px 0 var(--green-dark)}
    .speaker{font-size:11px;text-transform:uppercase;letter-spacing:.09em;font-weight:1000;margin-bottom:4px}
    .coach .speaker{color:var(--blue-dark)}.jason .speaker{color:var(--green-dark)}
    .en{font-size:17px;font-weight:750;line-height:1.58;letter-spacing:-.006em}.cn{font-size:14.5px;line-height:1.62;color:var(--muted);margin-top:4px}
    .speak-btn{width:42px;height:42px;border:2px solid #cfd7e2;border-bottom-width:4px;border-radius:13px;background:white;color:var(--blue-dark);cursor:pointer;font-size:17px}
    .speak-btn:active,.listen-btn:active,.toggle:active,.day-tab:active{transform:translateY(2px);border-bottom-width:2px}

    .story-card{position:relative;overflow:hidden;background:var(--paper);border:2px solid #b9dd9f;border-radius:28px;box-shadow:0 7px 0 #d7e7cb}
    .story-top{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:20px 24px;background:linear-gradient(90deg,var(--green-soft),#f9fff3);border-bottom:2px solid #d8edc8}
    .story-top b{font-size:15px}.story-top small{display:block;color:var(--muted);margin-top:3px}
    .listen-group{display:flex;gap:8px;flex-wrap:wrap}
    .listen-btn{border:2px solid var(--green-dark);border-bottom-width:4px;border-radius:14px;background:var(--green);color:white;padding:10px 14px;font-size:13px;font-weight:1000;cursor:pointer}
    .listen-btn.secondary{background:white;color:var(--green-dark);border-color:#a8d488}
    .story-body{padding:27px 30px 24px}
    .story-en{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;font-size:clamp(20px,2.3vw,25px);line-height:1.78;font-weight:600;color:#26344d;letter-spacing:.005em;margin:0}
    .story-cn{font-size:15.5px;line-height:1.9;color:#69758a;margin:18px 0 0;padding-top:17px;border-top:2px dashed #dde5dc}
    details.shadowing{border-top:2px solid #e2ebdc;background:#fbfff7}
    details.shadowing summary{list-style:none;cursor:pointer;padding:16px 24px;font-size:14px;font-weight:1000;color:var(--green-dark);display:flex;align-items:center;justify-content:space-between}
    details.shadowing summary::-webkit-details-marker{display:none}details.shadowing summary:after{content:"＋";font-size:20px}details[open].shadowing summary:after{content:"−"}
    .sentence-list{display:grid;gap:9px;padding:0 20px 20px}
    .sentence{display:grid;grid-template-columns:36px 1fr auto;align-items:start;gap:10px;background:white;border:2px solid #dfe7db;border-radius:15px;padding:12px}
    .sentence-no{width:32px;height:32px;display:grid;place-items:center;border-radius:10px;background:var(--green-soft);color:var(--green-dark);font-weight:1000;font-size:12px}
    .sentence .en{font-size:15.5px}.sentence .cn{font-size:13.5px}

    .upgrade-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .upgrade-card{background:white;border:2px solid #ded4fa;border-radius:20px;box-shadow:0 5px 0 #e5dffa;overflow:hidden}
    .upgrade-card h4{margin:0;padding:15px 17px;background:var(--purple-soft);font-size:15px;color:var(--purple-dark);border-bottom:2px solid #e6defa}
    .upgrade-lines{padding:9px 16px 10px}
    .upgrade-line{display:grid;grid-template-columns:70px 1fr 36px;gap:8px;align-items:center;padding:10px 0}
    .upgrade-line+.upgrade-line{border-top:1px solid #ece8f6}
    .level{font-size:10px;font-weight:1000;letter-spacing:.08em;border-radius:999px;padding:5px 7px;text-align:center;background:#f1f2f5;color:#667085}
    .level.natural{color:#5d3db4;background:#eee8ff}.level.spoken{color:white;background:var(--purple)}
    .upgrade-line .en{font-size:15px;line-height:1.45}
    .mini-speak{width:40px;height:40px;border:0;border-radius:11px;background:var(--purple-soft);color:var(--purple-dark);cursor:pointer}
    .upgrade-note{margin:0 16px 16px;padding:11px 12px;border-radius:12px;background:#faf8ff;color:#6b6480;font-size:13px;line-height:1.6}

    .correction-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}
    .correction{background:white;border:2px solid #eedb78;border-radius:19px;box-shadow:0 5px 0 #f0e5ac;padding:16px}
    .pair{display:grid;gap:7px;margin-bottom:10px}.wrong,.right{font-size:15px;line-height:1.45;font-weight:800;border-radius:11px;padding:9px 11px}
    .wrong{background:#fff0f0;color:#b73737}.right{background:#edfbdf;color:#347f08}
    .correction p{font-size:13.5px;line-height:1.65;color:var(--muted);margin:0}

    .review-card{display:flex;align-items:center;justify-content:space-between;gap:18px;background:#24304a;color:white;border-radius:22px;padding:21px 23px;box-shadow:0 6px 0 #111a2c}
    .review-card h4{font-size:18px;margin:0 0 5px}.review-card p{color:#cfd8e8;margin:0;font-size:14px;line-height:1.55}
    .review-card button{flex:none;border:2px solid white;border-bottom-width:4px;border-radius:14px;background:white;color:#24304a;padding:10px 14px;font-weight:1000;cursor:pointer}
    footer{text-align:center;color:#8a94a6;font-size:12px;line-height:1.7;margin-top:54px}
    .hide-en .en,.hide-en .story-en,.hide-en .upgrade-line{display:none}.hide-cn .cn,.hide-cn .story-cn{display:none}
    .hide-en .turn{grid-template-columns:42px 1fr}.hide-en .turn .speak-btn{display:none}
    .hide-en .sentence{grid-template-columns:36px 1fr}.hide-en .sentence .speak-btn{display:none}
    .hide-en .listen-group{display:none}
    .voice-toast{position:fixed;z-index:20;left:50%;bottom:24px;transform:translate(-50%,120px);opacity:0;background:#24304a;color:white;border-radius:999px;padding:11px 17px;font-size:13px;font-weight:800;box-shadow:0 8px 24px rgba(22,32,50,.2);transition:.25s}
    .voice-toast.show{transform:translate(-50%,0);opacity:1}
    @media(max-width:760px){
      .app{padding:15px 13px 60px}.topbar{padding:0 2px}.brand small{display:none}.hero{padding:28px 22px 25px;border-radius:24px}.hero:after{font-size:62px}
      .day-path{gap:8px}.day-tab{min-height:78px;padding:8px 4px;justify-content:center;flex-direction:column;gap:6px;text-align:center}.day-num{width:34px;height:34px}.day-tab span:last-child{display:block}.day-tab span:last-child b{font-size:11px}.day-tab span:last-child small{display:none}
      .lesson-head{align-items:flex-start;flex-direction:column}.lang-controls{justify-content:flex-start}
      .exchange{padding:15px 13px}.turn{grid-template-columns:38px 1fr 40px;gap:9px}.avatar{width:37px;height:37px}.en{font-size:16px}.cn{font-size:14px}
      .story-top{align-items:flex-start;flex-direction:column;padding:17px}.story-body{padding:22px 19px}.story-en{font-size:20px;line-height:1.72}.story-cn{font-size:14.5px;line-height:1.8}
      .upgrade-grid,.correction-list{grid-template-columns:1fr}.upgrade-line{grid-template-columns:65px 1fr 34px}.review-card{align-items:flex-start;flex-direction:column}
    }
    @media(max-width:430px){
      .topbar{gap:8px}.brand{gap:8px;font-size:14px}.brand-mark{width:42px;height:42px;border-radius:13px}.streak{padding:7px 9px;font-size:12px}
      .hero{padding:25px 18px 22px}.hero p{font-size:15px;line-height:1.7}.hero-meta{gap:7px}.meta-pill{font-size:11px;padding:7px 9px}
      .lesson-head h2{font-size:27px}.toggle{min-height:44px}.section{margin:30px 0 40px}.section-title h3{font-size:21px}
      .turn{grid-template-columns:36px minmax(0,1fr) 44px}.avatar{width:35px;height:35px}.speak-btn{width:44px;height:44px}.en{overflow-wrap:anywhere}
      .story-top .listen-group{width:100%}.listen-btn{flex:1;min-height:44px}.story-en{font-size:19px}.sentence-list{padding-inline:12px}.sentence{grid-template-columns:31px minmax(0,1fr) 44px;padding:10px 8px;gap:8px}.sentence-no{width:29px;height:29px}
      .upgrade-card h4{font-size:14px}.upgrade-lines{padding-inline:12px}.upgrade-line{grid-template-columns:61px minmax(0,1fr) 40px;gap:6px}.level{font-size:9px;padding-inline:5px}
    }
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><div class="brand-mark">J</div><div>Jason's English Journal<small>Speak · Repeat · Remember</small></div></div>
      <div class="streak">🔥 3 DAYS</div>
    </header>

    <section class="hero">
      <span class="eyebrow">Your real-life English notebook</span>
      <h1>把真实生活，练成能脱口而出的英语。</h1>
      <p>三天的练习已经整理成标准对话、连贯复述、地道替换和关键纠错。先听，再跟读，最后用自己的话讲出来。</p>
      <div class="hero-meta"><span class="meta-pill">🎧 每句可朗读</span><span class="meta-pill">📖 中英对照</span><span class="meta-pill">✨ 地道升级</span></div>
    </section>

    <nav class="day-path" id="dayPath" aria-label="选择学习日期"></nav>
    <section id="lesson"></section>
    <footer>Jason's English Journal · Built from your real conversations<br>每天慢读三遍，再关掉中文完整复述一遍。</footer>
  </main>
  <div class="voice-toast" id="voiceToast" role="status">正在朗读…</div>

  <script>
    const lessons = [
      {
        label:"DAY 01", short:"自我介绍", title:"认识 Jason：兴趣、电影与徒步",
        qa:[
          ["Hi, nice to meet you. Could you tell me a little about yourself?","嗨，很高兴认识你。可以简单介绍一下自己吗？","Hi, I'm Jason. I'm from Neijiang, Sichuan, China.","嗨，我叫 Jason。我来自中国四川内江。"],
          ["What do you like to do in your free time?","你空闲的时候喜欢做什么？","I enjoy listening to music and watching movies. I especially like pop music and romantic movies.","我喜欢听音乐和看电影。我尤其喜欢流行音乐和爱情电影。"],
          ["Why do you like watching movies?","你为什么喜欢看电影？","Because watching movies helps me relax.","因为看电影可以帮助我放松。"],
          ["What kind of movies do you usually watch?","你平时喜欢看什么类型的电影？","I like romantic movies, and I also watch a lot of American movies.","我喜欢爱情电影，也经常看美国电影。"],
          ["Do you like hiking?","你喜欢徒步吗？","I'd like to try hiking, but I've never been hiking before.","我想尝试徒步，不过我以前从来没有真正去徒步过。"],
          ["You sound tired. Are you going to bed?","听起来你有点累。你要去睡觉了吗？","Yeah, I'm really tired. I'm going to bed now. Maybe we can practice English again tomorrow.","对，我真的很累。我现在要去睡觉了。也许我们明天可以再练英语。"]
        ],
        story:{
          en:"Hi, I'm Jason. I'm from Neijiang, Sichuan, China. In my free time, I enjoy listening to music and watching movies. I especially like pop music and romantic movies, and I also watch a lot of American movies. Watching movies helps me relax. I'd also like to try hiking someday, although I've never been hiking before. I'm really tired now, so I'm going to bed. Maybe we can practice English again tomorrow.",
          cn:"嗨，我叫 Jason，来自中国四川内江。空闲的时候，我喜欢听音乐和看电影。我尤其喜欢流行音乐和爱情电影，也经常看美国电影。看电影可以帮助我放松。我以后也想尝试一下徒步，不过我以前还没有真正去徒步过。我现在真的很累，所以准备去睡觉了。也许我们明天可以再练习英语。",
          sentences:[
            ["Hi, I'm Jason. I'm from Neijiang, Sichuan, China.","嗨，我叫 Jason，来自中国四川内江。"],
            ["In my free time, I enjoy listening to music and watching movies.","空闲的时候，我喜欢听音乐和看电影。"],
            ["I especially like pop music and romantic movies, and I also watch a lot of American movies.","我尤其喜欢流行音乐和爱情电影，也经常看美国电影。"],
            ["Watching movies helps me relax.","看电影可以帮助我放松。"],
            ["I'd also like to try hiking someday, although I've never been hiking before.","我以后也想尝试一下徒步，不过我以前还没有真正去徒步过。"],
            ["I'm really tired now, so I'm going to bed. Maybe we can practice English again tomorrow.","我现在真的很累，所以准备去睡觉了。也许我们明天可以再练习英语。"]
          ]
        },
        upgrades:[
          {title:"表达喜欢看电影",lines:[["基础","I like watching movies."],["更自然","I enjoy watching movies."],["更口语","I'm really into movies."]],note:"be into something = 对某件事很感兴趣，是很日常的口语表达。"},
          {title:"表达看电影让我放松",lines:[["自然","Watching movies helps me relax."],["自然","Watching movies helps me feel relaxed."]],note:"relax 是动词；relaxed 是形容词。不要说 “helps me feel relax”。"},
          {title:"表达还没尝试过徒步",lines:[["基础","I haven't tried hiking yet."],["更口语","I've never been hiking, but I'd love to try it."]],note:"I'd love to try it 比 I want to try it 更柔和、更像聊天。"},
          {title:"表达很累，要睡觉",lines:[["基础","I'm really tired. I'm going to bed."],["更口语","I'm beat. I'm going to bed."],["更口语","I'm going to call it a night."]],note:"call it a night = 今天就到这里，准备休息或睡觉。"}
        ],
        corrections:[
          {wrong:"✕ I like watch movies.",right:"✓ I like watching movies.",note:"这里 like 后面接动作时，用动词的 -ing 形式。"},
          {wrong:"✕ It help me relax.",right:"✓ It helps me relax.",note:"主语是 it，动词 help 要加 -s。"},
          {wrong:"✕ It helps me feel relax.",right:"✓ It helps me feel relaxed.",note:"feel 后面用形容词 relaxed；也可以直接说 helps me relax。"}
        ],
        review:"先不看中文，用 45 秒介绍自己：来自哪里、喜欢什么、为什么喜欢，以及想尝试的活动。"
      },
      {
        label:"DAY 02", short:"游泳日常", title:"下班后的游泳、晚餐与项目",
        qa:[
          ["What are you up to right now?","你现在在做什么？","I'm just having a Coke.","我正在随便喝点可乐。"],
          ["What do you usually do after work?","你下班后通常做什么？","I usually go swimming after work. I usually swim from 8:00 to 9:15 p.m.","我下班后通常会去游泳。我一般从晚上八点游到九点十五分。"],
          ["Do you prefer swimming in the morning or at night?","你更喜欢早上游泳还是晚上游泳？","I prefer swimming at night, so I'm definitely a night person.","我更喜欢晚上游泳，所以我肯定是一个喜欢夜间活动的人。"],
          ["What do you usually do after swimming?","你游完泳后一般做什么？","I usually go home, take a shower, and then grab a light snack.","我通常会回家洗个澡，然后简单吃点东西。"],
          ["Do you usually cook when you get home?","你到家后通常会自己做饭吗？","Sometimes I'm too tired to cook, so I just order in. By then, I'm usually beat.","有时候我太累了，不想做饭，所以就直接点外卖。那个时候我通常已经累坏了。"],
          ["Why do you sometimes stay up late?","你为什么有时候会熬夜？","I'm in the middle of a project, so I often work on my computer at night.","因为我正在做一个项目，所以晚上经常会用电脑工作。"],
          ["What are you planning to do tomorrow?","你明天准备做什么？","I'm planning to sleep in because I've had a really busy week.","我准备睡个懒觉，因为这一周真的很忙。"]
        ],
        story:{
          en:"I usually go swimming after work, and I normally swim from 8:00 to 9:15 p.m. I prefer swimming at night, so I'm definitely a night person. After swimming, I usually go home, take a shower, and grab a light snack. Sometimes I'm too tired to cook, so I just order in. By then, I'm usually beat. These days, I'm also in the middle of a project, so I often stay up late working on my computer. On weekends, I like to sleep in. Tonight, I'm just having a Coke and relaxing.",
          cn:"我通常下班后去游泳，一般从晚上八点游到九点十五分。我更喜欢在晚上游泳，所以我肯定是一个喜欢夜间活动的人。游完泳后，我通常会回家洗澡，然后简单吃点东西。有时候我太累了，不想做饭，就直接点外卖。到那个时候，我通常已经累坏了。最近我还正在做一个项目，所以经常会熬夜用电脑工作。周末的时候，我喜欢睡懒觉。今晚我只是喝点可乐，放松一下。",
          sentences:[
            ["I usually go swimming after work, and I normally swim from 8:00 to 9:15 p.m.","我通常下班后去游泳，一般从晚上八点游到九点十五分。"],
            ["I prefer swimming at night, so I'm definitely a night person.","我更喜欢在晚上游泳，所以我肯定是一个喜欢夜间活动的人。"],
            ["After swimming, I usually go home, take a shower, and grab a light snack.","游完泳后，我通常会回家洗澡，然后简单吃点东西。"],
            ["Sometimes I'm too tired to cook, so I just order in. By then, I'm usually beat.","有时候我太累了，不想做饭，就直接点外卖。到那个时候，我通常已经累坏了。"],
            ["These days, I'm also in the middle of a project, so I often stay up late working on my computer.","最近我还正在做一个项目，所以经常会熬夜用电脑工作。"],
            ["On weekends, I like to sleep in. Tonight, I'm just having a Coke and relaxing.","周末的时候，我喜欢睡懒觉。今晚我只是喝点可乐，放松一下。"]
          ]
        },
        upgrades:[
          {title:"问“你在干什么”",lines:[["基础","What are you doing right now?"],["更口语","What are you up to?"]],note:"What are you up to? 既可以问现在在做什么，也可以问最近在忙什么。"},
          {title:"表达正在喝可乐",lines:[["基础","I'm drinking a Coke."],["更自然","I'm having a Coke."],["更口语","I'm just relaxing with a Coke."]],note:"have a Coke 是日常聊天里很自然的说法。"},
          {title:"表达简单吃点东西",lines:[["自然","I grab a light snack."],["更口语","I have a quick bite."]],note:"have a quick bite = 很快、随便吃一点。"},
          {title:"表达点外卖",lines:[["自然","I just order in."],["自然","I just order some food."],["更口语","I usually get takeout."]],note:"order in 强调送到家；get takeout 强调不自己做饭，也可以是自己买回来。"},
          {title:"表达正在做项目",lines:[["自然","I'm in the middle of a project."],["基础","I'm working on a project right now."],["更口语","I've got a project going on right now."]],note:"in the middle of 强调项目正在进行中。"},
          {title:"表达夜猫子与睡懒觉",lines:[["自然","I'm definitely a night person."],["更口语","I'm a night owl."],["自然","I'm planning to sleep in tomorrow."]],note:"sleep in 是比平时晚起；“昨晚睡得晚”是 I went to bed late last night。"}
        ],
        corrections:[
          {wrong:"✕ I'm go swimming.",right:"✓ I go swimming after work.",note:"日常习惯用一般现在时；现在准备去则说 I'm going swimming now。"},
          {wrong:"✕ I usually too tired to cook.",right:"✓ I'm usually too tired to cook.",note:"tired 是形容词，前面不能漏掉 am。"},
          {wrong:"△ I usually go swimming every day.",right:"✓ I go swimming every day. / I usually go swimming.",note:"usually 和 every day 意思有些重叠，选择一个会更干净。"}
        ],
        review:"用完整的一段话回答：你下班后做什么、几点游泳、游完做什么、太累时晚饭怎么办。"
      },
      {
        label:"DAY 03", short:"回家路上", title:"游完泳、去妈妈家，再回到家",
        qa:[
          ["How was your swim?","你今天游得怎么样？","It was pretty tiring. I swam 1,600 meters, so I'm beat.","挺累的。我游了一千六百米，所以现在累坏了。"],
          ["What did you do after swimming?","游完泳以后，你做了什么？","My mom called me and said she'd bought some fruit for me, so I drove to her place to pick it up.","我妈妈给我打电话，说她给我买了一些水果，所以我开车去她那里拿水果。"],
          ["What happened on your way home?","你回家的路上发生了什么？","I gave some of the fruit to a friend.","我把其中一些水果给了一个朋友。"],
          ["Where are you now?","你现在在哪里？","I'm on my way home. I'm pulling into the underground parking garage now.","我正在回家的路上。我现在正把车开进地下停车场。"],
          ["What are you doing next?","接下来你要做什么？","I'm taking the elevator up now.","我现在正在坐电梯上楼。"],
          ["Why weren't you able to talk in the elevator?","你刚才为什么不方便在电梯里说话？","I ran into two neighbors in the elevator, so it wasn't a good time to talk.","我在电梯里碰到了两个邻居，所以当时不太方便说话。"]
        ],
        story:{
          en:"I swam 1,600 meters after work, so I was already pretty tired. After swimming, my mom called me and said she'd bought some fruit for me, so I drove to her place to pick it up. On my way home, I gave some of the fruit to a friend. When I got home, I pulled into the underground parking garage and parked the car. Then I took the elevator upstairs. I ran into two neighbors in the elevator, so it wasn't a good time to talk. By the time I got home, I was completely wiped out.",
          cn:"下班后我游了一千六百米，所以当时已经很累了。游完泳后，我妈妈给我打电话，说她给我买了一些水果，于是我开车去她那里拿。回家的路上，我把其中一些水果给了一个朋友。到家以后，我把车开进地下停车场并停好，然后坐电梯上楼。我在电梯里碰到了两个邻居，所以当时不太方便说话。等我到家时，我已经彻底累坏了。",
          sentences:[
            ["I swam 1,600 meters after work, so I was already pretty tired.","下班后我游了一千六百米，所以当时已经很累了。"],
            ["After swimming, my mom called me and said she'd bought some fruit for me, so I drove to her place to pick it up.","游完泳后，我妈妈给我打电话，说她给我买了一些水果，于是我开车去她那里拿。"],
            ["On my way home, I gave some of the fruit to a friend.","回家的路上，我把其中一些水果给了一个朋友。"],
            ["When I got home, I pulled into the underground parking garage and parked the car.","到家以后，我把车开进地下停车场并停好。"],
            ["Then I took the elevator upstairs.","然后我坐电梯上楼。"],
            ["I ran into two neighbors in the elevator, so it wasn't a good time to talk.","我在电梯里碰到了两个邻居，所以当时不太方便说话。"],
            ["By the time I got home, I was completely wiped out.","等我到家时，我已经彻底累坏了。"]
          ]
        },
        upgrades:[
          {title:"表达游了一千六百米",lines:[["标准","I swam sixteen hundred meters."],["更口语","I did 1.6K in the pool."]],note:"1.6K 读作 one point six K，运动者之间很常用。"},
          {title:"表达去妈妈那里",lines:[["自然","I drove to my mom's place."],["自然","I drove to my mom's house."]],note:"my mom's place 更口语，重点是妈妈住的地方。"},
          {title:"表达顺道去拿东西",lines:[["基础","I went to pick it up."],["更自然","I stopped by to pick it up."],["更口语","I swung by my mom's place to pick it up."]],note:"stop by / swing by 都表示短暂去一下；swing by 更随意。"},
          {title:"表达正在回家",lines:[["自然","I'm on my way home."],["更口语","I'm heading home."]],note:"home 前通常不加 to：going home、heading home、on my way home。"},
          {title:"表达进入车库与停车",lines:[["开进去","I'm pulling into the underground parking garage."],["正在停","I'm parking in the underground garage."],["已停好","I parked in the underground garage."]],note:"pull into、parking、parked 分别对应开进去、正在停、已经停好。"},
          {title:"表达偶然碰见",lines:[["自然","I ran into two neighbors."],["更口语","I bumped into two neighbors."]],note:"这里不是撞到对方，而是“偶然碰见”。"},
          {title:"表达当时不方便说话",lines:[["自然","It wasn't a good time to talk."],["更口语","I couldn't really talk then."],["正式一点","I wasn't able to talk at the time."]],note:"日常聊天用 couldn't really talk then 最直接。"}
        ],
        corrections:[
          {wrong:"✕ some fruits",right:"✓ some fruit",note:"泛指一些水果时，fruit 通常作集合名词；强调不同种类时才常用 fruits。"},
          {wrong:"✕ I went her place.",right:"✓ I went to her place.",note:"去某人的住处要加 to；但 home 特殊：I went home，不加 to。"},
          {wrong:"✕ I parking in the garage.",right:"✓ I'm parking in the garage.",note:"现在进行时需要 am；地点前也要保留 in。"},
          {wrong:"✕ grush / grudge",right:"✓ garage · G-A-R-A-G-E",note:"美式发音接近 guh-RAHZH，重音在后半部分。"}
        ],
        review:"从“游完泳”开始，把去妈妈家、送水果、进车库、坐电梯、遇见邻居完整讲一遍。"
      }
    ];

    let current = Number(localStorage.getItem("jason-day") || 0);
    let showEn = true, showCn = true;
    const lessonEl = document.getElementById("lesson");
    const pathEl = document.getElementById("dayPath");

    const esc = value => String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const speechAttr = text => encodeURIComponent(text);
    const speakButton = (text, mini=false) => `<button class="${mini?'mini-speak':'speak-btn'}" data-speak="${speechAttr(text)}" aria-label="朗读英文">🔊</button>`;

    function renderPath(){
      pathEl.innerHTML = lessons.map((d,i)=>`<button class="day-tab ${i===current?'active':''}" data-day="${i}" aria-current="${i===current?'page':'false'}"><span class="day-num">${i+1}</span><span><b>${d.label}</b><small>${d.short}</small></span></button>`).join("");
    }

    function render(shouldScroll=false){
      const d=lessons[current];
      renderPath();
      lessonEl.innerHTML=`
        <header class="lesson-head">
          <div><div class="lesson-kicker">${d.label} · REAL CONVERSATION</div><h2>${d.title}</h2></div>
          <div class="lang-controls"><button class="toggle ${showEn?'on':''}" data-toggle="en">EN 英文</button><button class="toggle ${showCn?'on':''}" data-toggle="cn">中 中文</button></div>
        </header>

        <section class="section" id="dialogue">
          <div class="section-title"><span class="section-icon dialogue-icon">💬</span><div><h3>标准中英文对话</h3><p>先听老师的问题，再用 Jason 的回答练习自然接话。</p></div></div>
          <div class="dialogue-list">${d.qa.map((q)=>`
            <article class="exchange">
              <div class="turn coach"><div class="avatar">C</div><div><div class="speaker">Coach</div><div class="en">${esc(q[0])}</div><div class="cn">${esc(q[1])}</div></div>${speakButton(q[0])}</div>
              <div class="turn jason"><div class="avatar">J</div><div><div class="speaker">Jason</div><div class="en">${esc(q[2])}</div><div class="cn">${esc(q[3])}</div></div>${speakButton(q[2])}</div>
            </article>`).join("")}</div>
        </section>

        <section class="section" id="story">
          <div class="section-title"><span class="section-icon story-icon">📖</span><div><h3>连贯表达 · 今日完整故事</h3><p>这是今天最重要的学习版块：把零散回答串成一段真正能说出口的话。</p></div></div>
          <article class="story-card">
            <div class="story-top"><div><b>Natural Story</b><small>先听整段，再打开逐句跟读</small></div><div class="listen-group"><button class="listen-btn" data-speak="${speechAttr(d.story.en)}" data-rate="0.92">▶ 听整段</button><button class="listen-btn secondary" data-speak="${speechAttr(d.story.en)}" data-rate="0.72">🐢 慢速</button></div></div>
            <div class="story-body"><p class="story-en">${esc(d.story.en)}</p><p class="story-cn">${esc(d.story.cn)}</p></div>
            <details class="shadowing"><summary>打开逐句跟读模式</summary><div class="sentence-list">${d.story.sentences.map((s,i)=>`<div class="sentence"><span class="sentence-no">${String(i+1).padStart(2,'0')}</span><div><div class="en">${esc(s[0])}</div><div class="cn">${esc(s[1])}</div></div>${speakButton(s[0])}</div>`).join("")}</div></details>
          </article>
        </section>

        <section class="section" id="upgrades">
          <div class="section-title"><span class="section-icon upgrade-icon">✨</span><div><h3>地道表达升级</h3><p>紫色标签是更值得积累的口语版本；不必一次全背，先选最顺口的一句。</p></div></div>
          <div class="upgrade-grid">${d.upgrades.map(u=>`<article class="upgrade-card"><h4>${u.title}</h4><div class="upgrade-lines">${u.lines.map(line=>`<div class="upgrade-line"><span class="level ${line[0].includes('口语')?'spoken':line[0].includes('自然')?'natural':''}">${line[0]}</span><div class="en">${esc(line[1])}</div>${speakButton(line[1],true)}</div>`).join("")}</div><p class="upgrade-note">💡 ${u.note}</p></article>`).join("")}</div>
        </section>

        <section class="section" id="corrections">
          <div class="section-title"><span class="section-icon fix-icon">✓</span><div><h3>关键纠错</h3><p>只记住“为什么”和正确整句，不需要死背语法术语。</p></div></div>
          <div class="correction-list">${d.corrections.map(c=>`<article class="correction"><div class="pair"><div class="wrong en">${esc(c.wrong)}</div><div class="right en">${esc(c.right)}</div></div><p>${c.note}</p></article>`).join("")}</div>
        </section>

        <section class="section"><div class="review-card"><div><h4>🎯 今日复述任务</h4><p>${d.review}</p></div><button data-speak="${speechAttr(d.story.en)}" data-rate="0.82">再听一次</button></div></section>`;
      applyLanguages();
      if(shouldScroll) window.scrollTo({top:pathEl.offsetTop-12,behavior:"smooth"});
    }

    function applyLanguages(){
      document.body.classList.toggle("hide-en",!showEn);
      document.body.classList.toggle("hide-cn",!showCn);
    }

    function speak(text,rate=.92){
      if(!("speechSynthesis" in window)){showToast("当前浏览器不支持朗读");return;}
      speechSynthesis.cancel();
      const utterance=new SpeechSynthesisUtterance(text);
      const voices=speechSynthesis.getVoices();
      utterance.voice=voices.find(v=>v.lang.startsWith("en-US")&&/Samantha|Ava|Allison|Google|Microsoft/i.test(v.name))||voices.find(v=>v.lang.startsWith("en-US"))||voices.find(v=>v.lang.startsWith("en"))||null;
      utterance.lang="en-US";utterance.rate=rate;utterance.pitch=1;
      utterance.onstart=()=>showToast(rate<.8?"慢速朗读中…":"正在朗读…");
      utterance.onend=()=>hideToast();utterance.onerror=()=>hideToast();
      speechSynthesis.speak(utterance);
    }
    let toastTimer;
    function showToast(message){const el=document.getElementById("voiceToast");el.textContent=message;el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(hideToast,5000)}
    function hideToast(){document.getElementById("voiceToast").classList.remove("show")}

    document.addEventListener("click",e=>{
      const day=e.target.closest("[data-day]");
      if(day){current=Number(day.dataset.day);localStorage.setItem("jason-day",current);if("speechSynthesis" in window) window.speechSynthesis.cancel();render(true);return}
      const toggle=e.target.closest("[data-toggle]");
      if(toggle){if(toggle.dataset.toggle==="en"){if(showEn&&!showCn)return;showEn=!showEn}else{if(showCn&&!showEn)return;showCn=!showCn}render(false);return}
      const audio=e.target.closest("[data-speak]");
      if(audio)speak(decodeURIComponent(audio.dataset.speak),Number(audio.dataset.rate||.92));
    });
    render();
  </script>
</body>
</html>
